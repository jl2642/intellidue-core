name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Validate synthetic state
        run: intellidue validate-state tests/fixtures/synthetic_project/current_project_state.json
      - name: Validate synthetic release lock
        run: intellidue validate-lock tests/fixtures/synthetic_project/release_lock.json
      - name: Validate synthetic package validation
        run: intellidue validate-validation tests/fixtures/synthetic_project/package_validation.json
      - name: Validate synthetic contract
        run: intellidue validate-contract --state tests/fixtures/synthetic_project/current_project_state.json --lock tests/fixtures/synthetic_project/release_lock.json --validation tests/fixtures/synthetic_project/package_validation.json
      - name: Validate synthetic package
        run: intellidue validate-package tests/fixtures/synthetic_project/package.zip
      - name: Public repository hygiene
        run: python scripts/check_repo_hygiene.py
