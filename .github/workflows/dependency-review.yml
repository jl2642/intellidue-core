name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Native GitHub dependency review
        id: native-review
        continue-on-error: true
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          show-openssf-scorecard: true
          warn-on-openssf-scorecard-level: 3
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
      - name: Install project and pip-audit fallback
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip install -e .
      - name: Hard dependency vulnerability gate
        run: python -m pip_audit --local --progress-spinner off
      - name: Record native review availability
        env:
          NATIVE_OUTCOME: ${{ steps.native-review.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$NATIVE_OUTCOME" = success ]; then
            echo 'GitHub native dependency review: PASS'
          else
            echo 'GitHub native dependency review is not currently available or configured; pip-audit passed as the hard vulnerability gate.'
          fi
